<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeCheck 💫</title>

<style>
:root {
  --bg-color: #0b0f19;
  --card-bg: rgba(17, 24, 39, 0.7);
  --accent-color: #10b981; /* Calming emerald green */
  --accent-glow: rgba(16, 185, 129, 0.3);
  --text-primary: #f3f4f6;
  --text-secondary: #9ca3af;
  --btn-bg: #1f2937;
  --btn-hover: #374151;
}

body {
  margin:0;
  font-family: 'ui-monospace', 'Cascadia Code', 'Segoe UI', sans-serif;
  background-color: var(--bg-color);
  background-image: 
    radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
    radial-gradient(at 100% 0%, rgba(99, 102, 241, 0.05) 0px, transparent 50%);
  color: var(--text-primary);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.card {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 24px;
  padding: 30px;
  width: 360px;
  text-align: center;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

h2 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 5px;
  letter-spacing: -0.5px;
}

h3 {
  font-size: 16px;
  font-weight: 500;
  color: var(--text-secondary);
  line-height: 1.5;
  margin: 15px 0 20px 0;
}

p {
  color: var(--text-secondary);
  font-size: 14px;
  margin-bottom: 20px;
}

button {
  padding: 12px 16px;
  border: 1px solid rgba(255, 255, 255, 0.03);
  border-radius: 14px;
  margin: 0;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  background: var(--btn-bg);
  color: var(--text-primary);
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

button:hover {
  background: var(--btn-hover);
  border-color: rgba(255, 255, 255, 0.1);
  transform: translateY(-1px);
}

button:active {
  transform: translateY(0px);
}

/* Primary call to action buttons */
.cta-btn {
  background: var(--accent-color);
  color: #062c1e;
  font-weight: 600;
  border: none;
  width: 100%;
  margin-top: 10px;
}

.cta-btn:hover {
  background: #34d399;
  box-shadow: 0 0 20px var(--accent-glow);
}

.opts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 10px;
}

/* 5th option "Not Applicable" spans across both columns & looks softer */
.opts button:nth-child(5) {
  grid-column: span 2;
  background: transparent;
  border: 1px dashed rgba(255, 255, 255, 0.15);
  color: var(--text-secondary);
}

.opts button:nth-child(5):hover {
  background: rgba(255, 255, 255, 0.03);
  color: var(--text-primary);
}

.big {
  font-size: 48px;
  font-weight: 800;
  color: var(--accent-color);
  text-shadow: 0 0 30px var(--accent-glow);
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(0, 0, 0, 0.2);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  margin-top: 10px;
  box-sizing: border-box;
  text-align: center;
}

input:focus {
  outline: none;
  border-color: var(--accent-color);
}

.fade {
  animation: fade 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes fade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="card">
  <div id="app"></div>
</div>

<script>
const questions = [
 {
   q: "At a party, you typically...",
   opts: ["Work the room and make new friends 🎉", "Stick with your close friends and vibe deeply 🤝", "Show up, have fun, then dip early 🚗", "Find one person and have a long convo 🎧", "Honestly? Social battery varies wildly 🔋"]
 },
 {
   q: "Your humor style is basically...",
   opts: ["Dark jokes that hit different 😬", "Witty one-liners when the moment's right 🎯", "Goofy physical comedy 🤪", "Gentle roasts wrapped in genuine care 💛", "Memes that confuse everyone for 10 seconds then they laugh 😂"]
 },
 {
   q: "Ideal travel style?",
   opts: ["Packed itinerary, see everything 🗺️", "Cozy local spots, slow travel vibes 🏡", "Spontaneous road trip, no plans 🚙", "Blend of adventure and chill time 🌴", "Honestly prefer staycations 🛋️"]
 },
 {
   q: "Weekend plans be like...",
   opts: ["Out the whole time making memories 🎪", "Mix of social and solo recharge time ⚖️", "Home base with maybe one outing 🏠", "Depends on energy levels, honestly 🌀", "Spontaneous, whatever feels right 🎲"]
 },
 {
   q: "Your way of bonding with people is...",
   opts: ["Deep conversations at 2 AM 🌙", "Laughing so hard you can't breathe 😂", "Doing random adventures together 🎢", "Quiet comfort and inside jokes 🤍", "Being unfiltered and completely yourself 👽"]
 },
 {
   q: "When traveling, you're the person who...",
   opts: ["Maps out every detail beforehand 📋", "Wings it and finds hidden gems 🔍", "Follows the group but has opinions 👥", "Takes the scenic route every time 🛤️", "Honestly just happy to be there 🌟"]
 },
 {
   q: "At group chats, you're known for...",
   opts: ["Starting group plans and rallying people 📱", "The thoughtful messages that mean something 💭", "Sending memes at random times 🌙", "Showing up for the important stuff 💪", "Staying quiet but always there 🤐"]
 },
 {
   q: "Your love language is...",
   opts: ["Quality time and adventures 🎭", "Deep listening and genuine care 👂", "Making people laugh until it hurts 😆", "Small thoughtful gestures 🎁", "Just being completely yourself with them 🏳️‍🌈"]
 },
 {
   q: "When meeting new people, you...",
   opts: ["Jump into conversations naturally 💬", "Warm up gradually, then connect deeply 🌱", "Listen more than talk 👂", "Find common interests first 🔗", "Need a bit to feel comfortable 🐢"]
 },
 {
   q: "A friend suggests something wild, you say...",
   opts: ["'Let's go!' no questions asked 🚀", "'Tell me more...' then decide 🤔", "'Maybe, let's think about it' 💭", "'I'm down if you're down' 🤝", "'Sounds fun but I need details first' 📝"]
 },
 {
   q: "Traveling solo vs with people?",
   opts: ["Solo all the way, freedom! 🗺️", "With close friends only 👯", "Mix of both depending on destination 🌍", "With people but doing my own thing 🎯", "Would be anxious either way, honestly 😅"]
 },
 {
   q: "In conflict, you typically...",
   opts: ["Address it head-on, get it resolved 🎯", "Need time to process internally 🧠", "Find the humor to lighten mood 😄", "Listen first, speak thoughtfully 🤐", "Avoid it then feel bad later 👻"]
 },
 {
   q: "Your ideal group dynamic is...",
   opts: ["Everyone's chaotic together 💫", "Mix of personalities that balance 🎪", "Small crew of real ones 👑", "Big group but everyone's chill 🌟", "Honestly doesn't matter if vibes are good 🫂"]
 },
 {
   q: "Coffee date or concert?",
   opts: ["Concert, let's get hyped! 🎸", "Coffee, let's talk 💕", "Both but at different times ⚖️", "Depends on who I'm with 👥", "Coffee, less overstimulation 🍵"]
 },
 {
   q: "The best thing about you is...",
   opts: ["Bringing people together 🌍", "Making people feel understood 💙", "Your loyalty when it matters 🛡️", "Bringing humor to any situation 😂", "Being genuinely yourself always 👏"]
 }
];

let index=0;
let myAnswers=[];
const app=document.getElementById("app");

function encode(data){
 return btoa(encodeURIComponent(JSON.stringify(data)));
}
function decode(data){
 return JSON.parse(decodeURIComponent(atob(data)));
}

function showStart(){
 app.innerHTML=`
  <div class="fade">
  <h2>VibeCheck 💫</h2>
  <p>Play & share with your person 😄</p>
  <button class="cta-btn" onclick="start()">Start Quiz</button>
  </div>
 `;
}

function start(){
 index=0;
 myAnswers=[];
 showQ();
}

function showQ(){
 if(index>=questions.length){
  generateLink();
  return;
 }
 let q=questions[index];
 app.innerHTML=`
 <div class="fade">
  <h3>${q.q}</h3>
  <div class="opts">
   ${q.opts.map((o,i)=>`<button onclick="choose(${i})">${o}</button>`).join("")}
  </div>
 </div>
 `;
}

function choose(i){
 myAnswers.push(questions[index].opts[i]);
 index++;
 showQ();
}

function generateLink(){
 let data=encode(myAnswers);
 let link=location.origin+location.pathname+"?data="+encodeURIComponent(data);

 app.innerHTML=`
 <div class="fade">
  <h2>Send this link 😎</h2>
  <p>Let's see if they get you.</p>
  <input value="${link}" readonly id="linkBox">
  <button class="cta-btn" onclick="copy('${link}')">Copy Link</button>
 </div>
 `;
}

function copy(text){
 navigator.clipboard.writeText(text);
 alert("Copied! Send on WhatsApp 👍");
}

function load(){
 let params=new URLSearchParams(location.search);

 let result=params.get("result");
 if(result){
  let data=decode(decodeURIComponent(result));
  app.innerHTML=`
  <div class="fade">
   <div class="big">${data.percent}%</div>
   <h2>${data.msg}</h2>
   <button class="cta-btn" onclick="showStart()">Create Your Own</button>
  </div>
  `;
  return;
 }

 let data=params.get("data");
 if(!data){
  showStart();
  return;
 }

 let their=decode(decodeURIComponent(data));
 index=0;
 myAnswers=[];
 compareQ(their);
}

function compareQ(their){
 if(index>=questions.length){
  showResult(their);
  return;
 }

 let q=questions[index];
 app.innerHTML=`
 <div class="fade">
  <h3>${q.q}</h3>
  <div class="opts">
   ${q.opts.map((o,i)=>`<button onclick="compareChoose(${i})">${o}</button>`).join("")}
  </div>
 </div>
 `;
 window.their=their;
}

function compareChoose(i){
 myAnswers.push(questions[index].opts[i]);
 index++;
 compareQ(window.their);
}

function showResult(their){
 let match=0;
 for(let i=0;i<their.length;i++){
  if(their[i]===myAnswers[i]) match++;
 }

 let percent=Math.round((match/their.length)*100);

 let msg=percent>80?"Soulmate vibes 🔥":
         percent>60?"Strong match 🙂":
         percent>40?"Interesting combo 🤔":
         "Opposite energy 👀";

 let resultData=encode({percent,msg});
 let link=location.origin+location.pathname+"?result="+encodeURIComponent(resultData);

 app.innerHTML=`
 <div class="fade">
  <div class="big">${percent}%</div>
  <h2>${msg}</h2>
  <p>Share your result 😄</p>
  <input value="${link}" readonly>
  <button class="cta-btn" style="margin-bottom:10px;" onclick="copy('${link}')">Copy Result Link</button>
  <button class="cta-btn" style="background:#374151; color:white;" onclick="showStart()">Try Again</button>
 </div>
 `;
}

load();
</script>

</body>
</html>
