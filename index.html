<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Compatibility Game Link</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#0f172a,#020617);color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#111827;padding:20px;border-radius:20px;width:360px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.5)}
button{padding:12px;border:none;border-radius:10px;margin:6px;cursor:pointer;font-size:16px}
input{width:90%;padding:10px;margin:6px;border-radius:10px;border:none}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.big{font-size:26px;font-weight:bold}
</style>
</head>
<body>

<div class="card">
  <div id="app"></div>
</div>

<script>
const questions=[
 {q:"Your ideal date?",opts:["🍕 Netflix","✈️ Trip","🍷 Fancy dinner","🎮 Gaming","🌄 Long drive"]},
 {q:"Biggest red flag?",opts:["Lies 😶","Late reply ⏳","Too many ex 😅","No ambition 🚫","No respect 😤"]},
 {q:"Weekend vibe?",opts:["Sleep 😴","Party 🎉","Travel ✈️","Family 🏡","Gym 💪"]},
 {q:"Food mood?",opts:["Healthy 🥗","Street 🍔","Home 🏡","Anything 😄","Dessert 🍰"]},
 {q:"Love language?",opts:["Talk 💬","Care ❤️","Gifts 🎁","Time ⏰","Physical touch 🤝"]},
 {q:"Fight style?",opts:["Silent 🤐","Talk it out 💬","Ignore 😅","Win argument 😎","Apologize fast 🙏"]},
 {q:"Morning routine?",opts:["Workout 💪","Sleep more 😴","Phone scroll 📱","Meditation 🧘","Rush to work 🏃"]},
 {q:"Travel style?",opts:["Luxury 🏨","Budget 💸","Backpacking 🎒","Road trips 🚗","Stay home 😄"]},
 {q:"Spending habit?",opts:["Save all 💰","Spend freely 💸","Balanced ⚖️","Invest 📈","Impulse buy 😅"]},
 {q:"Social life?",opts:["Few close friends 🤍","Big group 🎉","Family first 🏡","Online friends 💻","Solo 🧍"]},
 {q:"Movie choice?",opts:["Romance ❤️","Action 🔥","Comedy 😂","Thriller 😱","Documentary 🎥"]},
 {q:"Communication style?",opts:["Direct 💬","Emotional ❤️","Logical 🧠","Avoid conflict 😅","Sarcastic 😏"]},
 {q:"Fitness level?",opts:["Daily workout 💪","Sometimes 😄","Rarely 😅","Sports 🏏","No interest 😴"]},
 {q:"Future goal?",opts:["Career growth 💼","Family 🏡","Travel world ✈️","Wealth 💰","Peaceful life 🌿"]},
 {q:"Handling stress?",opts:["Talk it out 💬","Sleep 😴","Eat 🍕","Workout 💪","Ignore 😅"]}
];

let myAnswers=[];
let index=0;

const app=document.getElementById("app");

// FIX: Robust UTF-8 Base64 using TextEncoder/TextDecoder
function encodeData(data){
 const json = JSON.stringify(data);
 const bytes = new TextEncoder().encode(json);
 let binary = '';
 bytes.forEach(b => binary += String.fromCharCode(b));
 return btoa(binary);
}

function decodeData(data){
 const binary = atob(data);
 const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
 const json = new TextDecoder().decode(bytes);
 return JSON.parse(json);
}

function renderStart(){
 app.innerHTML=`
  <h2>Compatibility Game 😄</h2>
  <p>Play first → then share link</p>
  <button onclick="startPlay()">Start</button>
 `;
}

function startPlay(){
 index=0; myAnswers=[];
 showQ();
}

function showQ(){
 if(index>=questions.length){
   generateLink();
   return;
 }
 let q=questions[index];
 app.innerHTML=`
  <h3>${q.q}</h3>
  <div class="opts">
   ${q.opts.map((o,i)=>`<button onclick="choose(${i})">${o}</button>`).join("")}
  </div>
 `;
}

function choose(i){
 if(index>=questions.length) return;
 myAnswers.push(questions[index].opts[i]);
 index++;
 showQ();
}

function generateLink(){
 let data=encodeData(myAnswers);
 let link = location.origin + location.pathname + "?data=" + encodeURIComponent(data);

 app.innerHTML=`
  <h3>Share this link 😎</h3>
  <input value="${link}" readonly />
  <button onclick="copyLink()">Copy</button>
 `;
}

function copyLink(){
  const input = document.querySelector("input");
  const text = input.value;

  // Try modern clipboard API
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(()=> alert("Link copied! Send on WhatsApp 👍"))
      .catch(()=> fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  const temp = document.createElement("textarea");
  temp.value = text;
  document.body.appendChild(temp);
  temp.select();
  temp.setSelectionRange(0, 99999);
  try {
    document.execCommand("copy");
    alert("Link copied! Send on WhatsApp 👍");
  } catch (err) {
    alert("Copy failed. Please copy manually.");
  }
  document.body.removeChild(temp);
}

function loadCompare(){
 let params=new URLSearchParams(window.location.search);
 let data = params.get("data");
 if(data) data = decodeURIComponent(data);
 if(!data) return renderStart();

 let theirAnswers;
 try{
   theirAnswers=decodeData(data);
 }catch(e){
   alert("Invalid or corrupted link");
   return renderStart();
 }

 index=0; myAnswers=[];
 showCompareQ(theirAnswers);
}

function showCompareQ(their){
 if(index>=questions.length){
   showResult(their);
   return;
 }
 let q=questions[index];
 app.innerHTML=`
  <h3>${q.q}</h3>
  <p>(Answer honestly 😄)</p>
  <div class="opts">
   ${q.opts.map((o,i)=>`<button onclick="compareChoose(${i})">${o}</button>`).join("")}
  </div>
 `;
 window.their=their;
}

function compareChoose(i){
 if(index>=questions.length) return;
 myAnswers.push(questions[index].opts[i]);
 index++;
 showCompareQ(window.their);
}

function showResult(their){
 let match=0;
 for(let i=0;i<their.length;i++){
  if(their[i]===myAnswers[i]) match++;
 }
 let percent=Math.round((match/their.length)*100);

 let msg= percent>80?"Perfect Match 🔥":percent>60?"Good Match 🙂":percent>40?"Hmm Interesting 🤔":"Opposites 👀";

 app.innerHTML=`
  <div class="big">${percent}%</div>
  <h3>${msg}</h3>
  <button onclick="renderStart()">Play Again</button>
 `;
}

loadCompare();
</script>

</body>
</html>
