<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compatibility Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.card {
  background: #111827;
  padding: 20px;
  border-radius: 20px;
  width: 360px;
  text-align: center;
}
button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 5px;
  cursor: pointer;
}
.opts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.big {
  font-size: 28px;
  font-weight: bold;
}
input {
  width: 90%;
  padding: 8px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<div class="card">
  <div id="app"></div>
</div>

<script>
const questions = [
 {q:"Your ideal date?",opts:["Netflix","Trip","Dinner","Gaming","Drive"]},
 {q:"Biggest red flag?",opts:["Lies","Late reply","Too many ex","No ambition","No respect"]},
 {q:"Weekend vibe?",opts:["Sleep","Party","Travel","Family","Gym"]},
 {q:"Food mood?",opts:["Healthy","Street","Home","Anything","Dessert"]},
 {q:"Love language?",opts:["Talk","Care","Gifts","Time","Touch"]},
 {q:"Fight style?",opts:["Silent","Talk it out","Ignore","Win","Apologize"]},
 {q:"Morning routine?",opts:["Workout","Sleep","Phone","Meditation","Rush"]},
 {q:"Travel style?",opts:["Luxury","Budget","Backpacking","Road trips","Stay home"]},
 {q:"Spending habit?",opts:["Save","Spend","Balanced","Invest","Impulse"]},
 {q:"Social life?",opts:["Close friends","Big group","Family","Online","Solo"]},
 {q:"Movie choice?",opts:["Romance","Action","Comedy","Thriller","Docs"]},
 {q:"Communication?",opts:["Direct","Emotional","Logical","Avoid","Sarcastic"]},
 {q:"Fitness?",opts:["Daily","Sometimes","Rarely","Sports","No interest"]},
 {q:"Future goal?",opts:["Career","Family","Travel","Wealth","Peace"]},
 {q:"Stress handling?",opts:["Talk","Sleep","Eat","Workout","Ignore"]}
];

let index = 0;
let myAnswers = [];

const app = document.getElementById("app");

// encoding (safe)
function encode(data){
  return btoa(encodeURIComponent(JSON.stringify(data)));
}
function decode(data){
  return JSON.parse(decodeURIComponent(atob(data)));
}

function start(){
  index = 0;
  myAnswers = [];
  showQ();
}

function showStart(){
  app.innerHTML = `
    <h2>Compatibility Game 😄</h2>
    <p>Play first → then share link</p>
    <button onclick="start()">Start</button>
  `;
}

function showQ(){
  if(index >= questions.length){
    generateLink();
    return;
  }

  let q = questions[index];
  app.innerHTML = `
    <h3>${q.q}</h3>
    <div class="opts">
      ${q.opts.map((o,i)=>`<button onclick="choose(${i})">${o}</button>`).join("")}
    </div>
  `;
}

function choose(i){
  myAnswers.push(questions[index].opts[i]);
  index++;
  showQ();
}

function generateLink(){
  let data = encode(myAnswers);
  let link = location.origin + location.pathname + "?data=" + encodeURIComponent(data);

  app.innerHTML = `
    <h3>Share this link 😎</h3>
    <input value="${link}" readonly />
    <button onclick="copy('${link}')">Copy</button>
  `;
}

function copy(text){
  navigator.clipboard.writeText(text);
  alert("Copied! Send on WhatsApp 👍");
}

function load(){
  let params = new URLSearchParams(location.search);

  let result = params.get("result");
  if(result){
    let data = decode(decodeURIComponent(result));
    app.innerHTML = `
      <div class="big">${data.percent}%</div>
      <h3>Compatibility 😄</h3>
      <button onclick="showStart()">Play</button>
    `;
    return;
  }

  let data = params.get("data");
  if(!data){
    showStart();
    return;
  }

  let their = decode(decodeURIComponent(data));
  index = 0;
  myAnswers = [];
  compareQ(their);
}

function compareQ(their){
  if(index >= questions.length){
    result(their);
    return;
  }

  let q = questions[index];
  app.innerHTML = `
    <h3>${q.q}</h3>
    <div class="opts">
      ${q.opts.map((o,i)=>`<button onclick="compareChoose(${i})">${o}</button>`).join("")}
    </div>
  `;
  window.their = their;
}

function compareChoose(i){
  myAnswers.push(questions[index].opts[i]);
  index++;
  compareQ(window.their);
}

function result(their){
  let match = 0;

  for(let i=0;i<their.length;i++){
    if(their[i] === myAnswers[i]) match++;
  }

  let percent = Math.round((match / their.length) * 100);

  let msg = percent > 80 ? "Perfect Match 🔥" :
            percent > 60 ? "Good Match 🙂" :
            percent > 40 ? "Interesting 🤔" :
            "Opposites 👀";

  let resultData = encode({percent});
  let link = location.origin + location.pathname + "?result=" + encodeURIComponent(resultData);

  app.innerHTML = `
    <div class="big">${percent}%</div>
    <h3>${msg}</h3>
    <p>Share result 😄</p>
    <input value="${link}" readonly />
    <button onclick="copy('${link}')">Copy Result</button>
    <button onclick="showStart()">Play Again</button>
  `;
}

load();
</script>

</body>
</html>
